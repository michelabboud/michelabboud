name: Sync Forked Repos

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    steps:
      - name: Sync approved forks safely
        uses: actions/github-script@v7
        env:
          OWNER: michelabboud
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = process.env.OWNER;
            const dryRun = process.env.DRY_RUN !== 'false';

            // -------------------------------
            // CONFIGURATION
            // -------------------------------

            // Repos never to touch
            const skipRepos = new Set([
              'michelabboud', // profile repo
              '.github',      // special repo if it exists
              // 'fork-admin', // add your controller repo here if relevant
            ]);

            // Set to true to only process forks explicitly listed in allowedForks
            // Set to false to inspect all forks except skipRepos
            const useAllowlist = false;

            // Explicitly approved forks to sync when useAllowlist = true
            const allowedForks = new Set([
              // 'repo-a',
              // 'repo-b',
            ]);

            // Forks allowed even if they contain .github/workflows/*
            const allowedWorkflowForks = new Set([
              // 'repo-a',
            ]);

            // Forks allowed even if Actions are enabled
            const allowedActionsEnabledForks = new Set([
              // 'repo-a',
            ]);

            // -------------------------------
            // HELPERS
            // -------------------------------

            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function hasWorkflowFiles(owner, repo) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: '.github/workflows',
                });

                return Array.isArray(data) && data.length > 0;
              } catch (error) {
                if (error.status === 404) return false;
                throw error;
              }
            }

            async function getActionsEnabled(owner, repo) {
              try {
                const { data } = await github.rest.actions.getGithubActionsPermissionsRepository({
                  owner,
                  repo,
                });
                return data.enabled;
              } catch (error) {
                core.warning(`${repo}: Could not read Actions status: ${error.message}`);
                return null;
              }
            }

            async function hasOpenPRAgainstUpstream(repoDetails) {
              if (!repoDetails.parent) return false;

              const parentOwner = repoDetails.parent.owner.login;
              const parentRepo = repoDetails.parent.name;

              const prs = await github.paginate(github.rest.pulls.list, {
                owner: parentOwner,
                repo: parentRepo,
                state: 'open',
                per_page: 100,
              });

              return prs.some(pr =>
                pr.head?.repo?.owner?.login === owner &&
                pr.head?.repo?.name === repoDetails.name
              );
            }

            // -------------------------------
            // MAIN
            // -------------------------------

            // Keep listForUser so behavior matches your original approach
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              type: 'owner',
              per_page: 100,
            });

            let forks = repos.filter(r => r.fork && !skipRepos.has(r.name));

            if (useAllowlist) {
              forks = forks.filter(r => allowedForks.has(r.name));
            }

            core.info(`Found ${forks.length} candidate fork(s)`);
            core.info(`Dry run mode: ${dryRun}`);

            const synced = [];
            const skipped = [];
            const failed = [];

            for (const fork of forks) {
              const repo = fork.name;

              try {
                core.info(`--- Checking ${repo} ---`);

                // IMPORTANT:
                // listForUser does not reliably include parent/source metadata for forks.
                // Fetch full repo details before making fork decisions.
                const { data: repoDetails } = await github.rest.repos.get({
                  owner,
                  repo,
                });

                const defaultBranch = repoDetails.default_branch;

                if (!defaultBranch) {
                  skipped.push({ repo, reason: 'No default branch' });
                  core.info(`⏭️ ${repo}: Skipping — no default branch`);
                  continue;
                }

                if (repoDetails.archived) {
                  skipped.push({ repo, reason: 'Archived repository' });
                  core.info(`⏭️ ${repo}: Skipping — archived repository`);
                  continue;
                }

                if (!repoDetails.parent) {
                  skipped.push({ repo, reason: 'No parent metadata from repo details' });
                  core.info(`⏭️ ${repo}: Skipping — no parent metadata from repo details`);
                  continue;
                }

                const workflowFiles = await hasWorkflowFiles(owner, repo);
                if (workflowFiles && !allowedWorkflowForks.has(repo)) {
                  skipped.push({ repo, reason: 'Contains workflow files' });
                  core.info(`⏭️ ${repo}: Skipping — contains .github/workflows`);
                  continue;
                }

                const actionsEnabled = await getActionsEnabled(owner, repo);
                if (actionsEnabled === null) {
                  skipped.push({ repo, reason: 'Could not determine Actions status' });
                  core.info(`⏭️ ${repo}: Skipping — could not determine Actions status`);
                  continue;
                }

                if (actionsEnabled === true && !allowedActionsEnabledForks.has(repo)) {
                  skipped.push({ repo, reason: 'Actions enabled on fork' });
                  core.info(`⏭️ ${repo}: Skipping — Actions are enabled on this fork`);
                  continue;
                }

                const openPR = await hasOpenPRAgainstUpstream(repoDetails);
                if (openPR) {
                  skipped.push({ repo, reason: 'Open PR against upstream exists' });
                  core.info(`⏭️ ${repo}: Skipping — open PR against upstream exists`);
                  continue;
                }

                if (dryRun) {
                  skipped.push({
                    repo,
                    reason: `Dry run — would sync ${defaultBranch} from ${repoDetails.parent.full_name}`,
                  });
                  core.info(`🧪 ${repo}: Dry run — would sync ${defaultBranch} from ${repoDetails.parent.full_name}`);
                  continue;
                }

                const result = await github.rest.repos.mergeUpstream({
                  owner,
                  repo,
                  branch: defaultBranch,
                });

                const mergeType = result.data?.merge_type || 'unknown';

                if (mergeType === 'none') {
                  core.info(`ℹ️ ${repo}: Already up to date`);
                } else {
                  core.info(`✅ ${repo}: Synced ${defaultBranch} (${mergeType})`);
                }

                synced.push({
                  repo,
                  branch: defaultBranch,
                  upstream: repoDetails.parent.full_name,
                  mergeType,
                });

              } catch (error) {
                if (error.status === 409) {
                  failed.push({
                    repo,
                    status: 409,
                    message: 'Conflict — manual merge needed',
                  });
                  core.warning(`⚠️ ${repo}: Conflict — manual merge needed`);
                } else {
                  failed.push({
                    repo,
                    status: error.status || 'unknown',
                    message: error.message,
                  });
                  core.warning(`❌ ${repo}: Error — ${error.message}`);
                }
              }

              await sleep(300);
            }

            const report = {
              dryRun,
              totalCandidates: forks.length,
              synced,
              skipped,
              failed,
            };

            core.info(`Done. Synced: ${synced.length}, Skipped: ${skipped.length}, Failed: ${failed.length}`);

            await core.summary
              .addHeading('Fork Sync Report')
              .addCodeBlock(JSON.stringify(report, null, 2), 'json')
              .write();
