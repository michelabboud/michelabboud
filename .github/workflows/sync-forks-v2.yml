name: Sync Forked Repos

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    steps:
      - name: Sync approved forks safely
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = 'michelabboud';
            const dryRun = core.getInput('dry_run') !== 'false';

            // -------------------------------
            // CONFIGURATION
            // -------------------------------

            const skipRepos = new Set([
              'michelabboud',
              '.github',
              // 'fork-admin',
            ]);

            const useAllowlist = true;

            const allowedForks = new Set([
              // 'repo-a',
              // 'repo-b',
            ]);

            const allowedWorkflowForks = new Set([
              // 'repo-a',
            ]);

            const allowedActionsEnabledForks = new Set([
              // 'repo-a',
            ]);

            // -------------------------------
            // HELPERS
            // -------------------------------

            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function hasWorkflowFiles(owner, repo) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: '.github/workflows',
                });

                return Array.isArray(data) && data.length > 0;
              } catch (error) {
                if (error.status === 404) return false;
                throw error;
              }
            }

            async function getActionsEnabled(owner, repo) {
              try {
                const { data } = await github.rest.actions.getGithubActionsPermissionsRepository({
                  owner,
                  repo,
                });
                return data.enabled;
              } catch (error) {
                core.warning(`${repo}: Could not read Actions status: ${error.message}`);
                return null;
              }
            }

            async function hasOpenPRAgainstUpstream(fork) {
              if (!fork.parent) return false;

              const parentOwner = fork.parent.owner.login;
              const parentRepo = fork.parent.name;

              const prs = await github.paginate(github.rest.pulls.list, {
                owner: parentOwner,
                repo: parentRepo,
                state: 'open',
                per_page: 100,
              });

              return prs.some(pr =>
                pr.head?.repo?.owner?.login === owner &&
                pr.head?.repo?.name === fork.name
              );
            }

            // -------------------------------
            // MAIN
            // -------------------------------

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              type: 'owner',
              per_page: 100,
            });

            let forks = repos.filter(r => r.fork && !skipRepos.has(r.name));

            if (useAllowlist) {
              forks = forks.filter(r => allowedForks.has(r.name));
            }

            core.info(`Found ${forks.length} candidate fork(s)`);
            core.info(`Dry run mode: ${dryRun}`);

            const synced = [];
            const skipped = [];
            const failed = [];

            for (const fork of forks) {
              const repo = fork.name;
              const defaultBranch = fork.default_branch;

              try {
                core.info(`--- Checking ${repo} ---`);

                if (!defaultBranch) {
                  skipped.push({ repo, reason: 'No default branch' });
                  core.info(`⏭️ ${repo}: Skipping — no default branch`);
                  continue;
                }

                if (!fork.parent) {
                  skipped.push({ repo, reason: 'No parent metadata' });
                  core.info(`⏭️ ${repo}: Skipping — no parent metadata`);
                  continue;
                }

                const workflowFiles = await hasWorkflowFiles(owner, repo);
                if (workflowFiles && !allowedWorkflowForks.has(repo)) {
                  skipped.push({ repo, reason: 'Contains workflow files' });
                  core.info(`⏭️ ${repo}: Skipping — contains .github/workflows`);
                  continue;
                }

                const actionsEnabled = await getActionsEnabled(owner, repo);
                if (actionsEnabled === true && !allowedActionsEnabledForks.has(repo)) {
                  skipped.push({ repo, reason: 'Actions enabled on fork' });
                  core.info(`⏭️ ${repo}: Skipping — Actions are enabled on this fork`);
                  continue;
                }

                const openPR = await hasOpenPRAgainstUpstream(fork);
                if (openPR) {
                  skipped.push({ repo, reason: 'Open PR against upstream exists' });
                  core.info(`⏭️ ${repo}: Skipping — open PR against upstream exists`);
                  continue;
                }

                if (dryRun) {
                  skipped.push({ repo, reason: `Dry run — would sync ${defaultBranch}` });
                  core.info(`🧪 ${repo}: Dry run — would sync branch ${defaultBranch}`);
                  continue;
                }

                const result = await github.rest.repos.mergeUpstream({
                  owner,
                  repo,
                  branch: defaultBranch,
                });

                const mergeType = result.data?.merge_type || 'unknown';

                if (mergeType === 'none') {
                  core.info(`ℹ️ ${repo}: Already up to date`);
                } else {
                  core.info(`✅ ${repo}: Synced ${defaultBranch} (${mergeType})`);
                }

                synced.push({
                  repo,
                  branch: defaultBranch,
                  mergeType,
                });

              } catch (error) {
                if (error.status === 409) {
                  failed.push({
                    repo,
                    status: 409,
                    message: 'Conflict — manual merge needed',
                  });
                  core.warning(`⚠️ ${repo}: Conflict — manual merge needed`);
                } else {
                  failed.push({
                    repo,
                    status: error.status || 'unknown',
                    message: error.message,
                  });
                  core.warning(`❌ ${repo}: Error — ${error.message}`);
                }
              }

              await sleep(300);
            }

            const report = {
              dryRun,
              totalCandidates: forks.length,
              synced,
              skipped,
              failed,
            };

            core.info(`Done. Synced: ${synced.length}, Skipped: ${skipped.length}, Failed: ${failed.length}`);

            await core.summary
              .addHeading('Fork Sync Report')
              .addCodeBlock(JSON.stringify(report, null, 2), 'json')
              .write();
